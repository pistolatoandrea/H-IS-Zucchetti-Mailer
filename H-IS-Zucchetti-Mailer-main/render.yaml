services:
  - type: web
    name: zucchetti-mailer
    env: python
    plan: free
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ZUCCHETTI_USER
        sync: false
      - key: ZUCCHETTI_PASS
        sync: false
      - key: ZUCCHETTI_COMPANY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: BREVO_TEMPLATES
        sync: false
      - key: APP_PASSWORD
        sync: false
 